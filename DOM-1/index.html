<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="main">
        <nav>

        </nav>
        <section class="Allcards">
            <div class="todo cards" id="0">
                <video autoplay muted loop src="./video1.mp4"></video>
                <h2>To Do List</h2>
            </div>

            <div class="dp cards" id="1">
                <video autoplay muted loop src="./video2.mp4"></video>
                <h2>Daily Planner</h2>
            </div>

            <div class="mt cards" id="2">
                <video autoplay muted loop src="./video3.mp4"></video>
                <h2>Motivation</h2>
            </div>

            <div class="pt cards" id="3">
                <video autoplay muted loop src="./video4.mp4"></video>
                <h2>Pomodoro Timer</h2>
            </div>

            <div class="dg cards" id="4">
                <video autoplay muted loop src="./video5.mp4"></video>
                <h2>Daily Goals</h2>
            </div>
        </section>
        <section class="Pages todo-fullpage">
            <button class="back" id="0">Close</button>
            <h2>Your Personalised Task List</h2>

            <div class="todo-container">
                <div class="addtask">
                    <form>
                        <input type="text" class="Entertask" placeholder="Enter Task">
                        <textarea placeholder="Enter Task Description" id=""></textarea>
                        <div class="imp-wrapper">
                        <input type="checkbox" name="" id="mark-imp">
                        <label for="mark-imp">Mark This as Important!</label>
                        </div>
                        <button>Add Task</button>
                    </form>
                </div>
                <div class="alltask">
                
                </div>
            </div>
        </section>

        <section class="Pages dailyplanner-fullpage">
            <button class="back" id="1">Close</button>
            <h1>Daily Planner Page</h1>
        </section>

        <section class="Pages motivation-fullpage">
            <button class="back" id="2">Close</button>
            <h1>Motivation Page</h1>
        </section>

        <section class="Pages pomodoro-fullpage">
            <button class="back" id="3">Close</button>
            <h1>Pomodoro Timer Page</h1>
        </section>

        <section class="Pages dailygoals-fullpage">
            <button class="back" id="4">Close</button>
            <h1>Daily Goals Page</h1>
        </section>
    </div>
    <script src="./script.js"></script>
</body>
</html>
